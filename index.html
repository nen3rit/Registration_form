<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Registration Form</h1>
    <p>Please fill out this form with the required information</p>
    <form action="https://register-demo.freecodecamp.org" method="post">
        <fieldset>
            <label for="first-name">Enter Your First Name: <input type="text" id="first-name" name="first-name" required></label>
            <label for="last-name">Enter Your Last Name: <input type="text" id="last-name" name="last-name" required></label>
            <label for="email">Enter Your Email: <input type="email" id="email" name="email" required></label>
            <label for="new-password">Create a New Password: <input type="password" id="new-password" name="password" minlength="8" pattern="[a-z0-5]{8,}" required></label>
        </fieldset>
        <fieldset>
            <legend>Account Type (required)</legend>
            <label for="personal-account"><input class="inline" name="account-type" value="personal" checked id="personal-account"> Personal</label>
            <label for="business-account"><input class="inline" name="account-type" value="business" id="business-account"> Business</label>
        </fieldset>
        <fieldset>
            <label for="profile-picture">Upload a profile picture: <input type="file" name="profile-picture" id="profile-picture"></label>
            <label for="age">Input your age (years): <input type="number" min="13" max="120" id="age" name="age"></label>
             <label for="referrer">How did you hear about us? 
         <select name="referrer" id="referrer" name="referrer">
            <option value="">(select one)</option>
            <option value="1">freeCodeCamp News</option>
            <option value="2">freeCodeCamp Youtube Channel</option>
            <option value="3">freeCodeCamp Forum</option>
            <option value="4">Other</option>
        </select>
        <label for="bio">Provide a bio:
            <textarea name="bio" id="bio" rows="3" cols="30" placeholder="I like coding on the beach..."></textarea>
        </label>
        </fieldset>
         <a href="https://www.freecodecamp.org/news/terms-of-service/">Read our terms and conditions</a>
        <label for="terms-and-conditions"><input class="inline" type="checkbox" required name="terms-and-conditions" id="terms-and-conditions">I accept the terms and conditions </label>
       </label>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
