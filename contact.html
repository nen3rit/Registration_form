<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us!</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="form-container">
       <form action="">
         <h2>Contact Us</h2>
        <fieldset>
            <label for="name">Name: <input type="text" id="name" name="name" required></label>
            <label for="email">Email: <input type="email" id="email" name="email" required></label>
        <label for="bio">Message:
            <textarea name="bio" id="bio" rows="3" cols="30" placeholder="I like coding on the beach..." required></textarea>
        </label>
        <button type="submit">Submit</button>
        </fieldset>
       </form>
    </div>
</body>
</html>
